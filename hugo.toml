baseURL = "https://ryanorban.com/"
languageCode = "en-us"
title = "Ryan Orban"
copyright = "Ryan Orban"
enableRobotsTXT = true

[module]
  [[module.imports]]
    path = "github.com/michenriksen/hugo-theme-til"

[outputs]
  home = ["HTML"]
  section = ["HTML", "RSS", "JSON"]
  page = ["HTML"]

[menus]
  [[menus.main]]
    name = "Writing"
    pageRef = "/posts"
    weight = 10
  [[menus.main]]
    name = "Notes"
    pageRef = "/notes"
    weight = 20
  [[menus.main]]
    name = "About"
    pageRef = "/about"
    weight = 30
  [[menus.main]]
    name = "GitHub"
    url = "https://github.com/orban"
    weight = 40
    [menus.main.params]
      external = true

[params]
  dateFormat = ":date_long"
  showGraph = true

  [params.author]
    name = "Ryan Orban"
    email = "me@ryanorban.com"

  [params.home]
    showRecentPosts = false
    showRecentNotes = false

  [params.footer]
    creativeCommonsLicense = "none"
    showThemeCredit = true

  [params.robotsTxt]
    blockAI = true

[markup]
  [markup.highlight]
    style = "tokyonight-night"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        inline = [['$', '$']]
        block = [['$$', '$$']]
  [markup.goldmark.parser]
    [markup.goldmark.parser.attribute]
      block = true
