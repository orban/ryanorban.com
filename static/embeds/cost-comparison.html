<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: transparent; }
  @media (prefers-color-scheme: dark) { :root { --text-primary: rgba(255,255,255,0.88); --text-secondary: rgba(255,255,255,0.55); } }
  @media (prefers-color-scheme: light) { :root { --text-primary: rgba(0,0,0,0.88); --text-secondary: rgba(0,0,0,0.45); } }
  .container { padding: 1rem 0; }
  .title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin: 0 0 4px; }
  .subtitle { font-size: 12px; color: var(--text-secondary); margin: 0 0 12px; }
  .chart-wrap { position: relative; width: 100%; height: 380px; }
  .legend { display: flex; gap: 20px; justify-content: center; margin-top: 8px; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="container">
  <p class="title">SPRT cost savings vs. fixed-sample testing</p>
  <p class="subtitle">5 contracts, 50 max trials each — SPRT stops early when evidence is clear</p>
  <div class="chart-wrap"><canvas id="costChart"></canvas></div>
  <div class="legend">
    <span><span class="dot" style="background:#A32D2D;"></span>Fixed N=50</span>
    <span><span class="dot" style="background:#0F6E56;"></span>SPRT (early stop)</span>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = ['$0.01/trial', '$1.00/trial', '$5.00/trial'];
const fixedData = [2.50, 250, 1250];
const sprtData = [0.70, 70, 350];

const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
const tickColor = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.45)';
const annotColor = isDark ? 'rgba(255,255,255,0.65)' : 'rgba(0,0,0,0.55)';

new Chart(document.getElementById('costChart'), {
  type: 'bar',
  data: {
    labels,
    datasets: [
      {
        label: 'Fixed N=50',
        data: fixedData,
        backgroundColor: '#A32D2D',
        borderRadius: 3,
        barPercentage: 0.7,
        categoryPercentage: 0.6
      },
      {
        label: 'SPRT (early stop)',
        data: sprtData,
        backgroundColor: '#0F6E56',
        borderRadius: 3,
        barPercentage: 0.7,
        categoryPercentage: 0.6
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (item) => {
            const val = item.raw;
            const formatted = val >= 1 ? '$' + val.toLocaleString() : '$' + val.toFixed(2);
            return item.dataset.label + ': ' + formatted;
          }
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { color: tickColor, font: { size: 12 } }
      },
      y: {
        type: 'logarithmic',
        title: { display: true, text: 'Cost per CI run ($)', font: { size: 12 }, color: tickColor },
        grid: { color: gridColor },
        ticks: {
          color: tickColor,
          font: { size: 11 },
          callback: (v) => {
            if ([0.1, 1, 10, 100, 1000].includes(v)) return '$' + v.toLocaleString();
            return '';
          }
        },
        min: 0.1,
        max: 2000
      }
    },
    animation: {
      onComplete: function() {
        const chart = this;
        const ctx = chart.ctx;
        const meta0 = chart.getDatasetMeta(0);
        const meta1 = chart.getDatasetMeta(1);

        ctx.save();
        ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = annotColor;
        ctx.textAlign = 'center';

        for (let i = 0; i < meta0.data.length; i++) {
          const fixedBar = meta0.data[i];
          const sprtBar = meta1.data[i];
          const pct = Math.round((1 - sprtData[i] / fixedData[i]) * 100);
          const x = sprtBar.x;
          const y = sprtBar.y - 8;
          ctx.fillText(pct + '% savings', x, y);
        }
        ctx.restore();
      }
    }
  }
});
</script>
</body>
</html>
